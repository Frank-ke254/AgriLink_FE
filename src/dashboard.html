    <link rel="shortcut icon" href="../img/AgriLink.png" type="image/x-icon">

    <header>
    <div><strong>AgriLink</strong></div>
    <nav>
      <a href="#">Dashboard</a>
      <a href="urban.html">Listings</a>
      <a href="index.html">Log Out</a>
    </nav>
  </header>


  <section id="listings" class="section">
    <h2>My Waste Listings</h2>
    <table>
      <thead>
        <tr>
          <th>Waste Type</th>
          <th>Quantity</th>
          <th>Location</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Vegetables</td>
          <td>20kg</td>
          <td>Gikomba Market</td>
        </tr>
        <tr>
          <td>Fruit Peels</td>
          <td>15kg</td>
          <td>City Park Market</td>
        </tr>
      </tbody>
    </table>
  </section>

  <section id="requests" class="section">
    <h2>Requests from Rural Farmers</h2>
    <table>
      <thead>
        <tr>
          <th>Requested Waste</th>
          <th>From</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="requestTableBody">
        <!-- Requests will load here -->
      </tbody>
    </table>
  </section>
