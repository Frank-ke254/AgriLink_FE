<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../img/AgriLink.png" type="image/x-icon">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <div class="login-container">
    <h2>Welcome Back to AgriLink</h2>
    <form id="loginForm">
      <label for="email">Email Address</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" required />

      <label for="role">I am a:</label>
      <select id="role" required>
        <option value="">-- Select Role --</option>
        <option value="urban">Urban Provider</option>
        <option value="rural">Rural Farmer</option>
      </select>

      <button type="submit">Login</button>
      <div class="message" id="loginMessage"></div>

      <p>Don't have an account? <a href="register.html"><u><strong>Sign Up</strong></u></a></p>
    </form>
  </div>

  <script src="login.js"></script>
</body>
</html>
