<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink | Urban Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../img/AgriLink.png" type="image/x-icon">
  <link rel="stylesheet" href="urban.css">
</head>
<body>
  <header>
    <h1>Urban Provider Dashboard</h1>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="#add">Add Listing</a>
      <a href="#requests">View Requests</a>
    </nav>
  </header>

  <section id="add" class="section">
    <h2>Add Waste Listing</h2>
    <form id="listingForm">
      <input type="text" id="wasteType" placeholder="Waste Type (e.g., Vegetables)" required />
      <input type="text" id="quantity" placeholder="Quantity (e.g., 20kg)" required />
      <input type="text" id="location" placeholder="Pickup Location" required />
      <textarea id="notes" placeholder="Additional Notes (optional)"></textarea>
      <button type="submit">Submit Listing</button>
      <div class="message" id="listingMessage"></div>
    </form>
  </section>

  <section id="requests" class="section">
    <h2>Incoming Requests</h2>
    <table class="request-table">
      <thead>
        <tr>
          <th>Farmer Name</th>
          <th>Requested Waste</th>
          <th>Quantity</th>
          <th>Message</th>
        </tr>
      </thead>
      <tbody id="requestTableBody">
        <!-- Requests will be dynamically inserted here -->
      </tbody>
    </table>
  </section>

  <script src="urban.js"></script>
</body>
</html>
