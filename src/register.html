<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgriLink | Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="../img/AgriLink.png" type="image/x-icon">
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="register-container">
    <h2>Create Your AgriLink Account</h2>
    <form id="registerForm">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" required />

      <label for="email">Email Address</label>
      <input type="email" id="email" required />

      <label for="role">I am a:</label>
      <select id="role" required>
        <option value="">-- Select Role --</option>
        <option value="urban">Urban Provider</option>
        <option value="rural">Rural Farmer</option>
      </select>

      <label for="password">Password</label>
      <input type="password" id="password" required />

      <button type="submit">Register</button>
      <div class="message" id="regMessage"></div>

      <p>Already have an account? <a href="login.html"><u><strong>Sign In</strong></u></a></p>
    </form>
  </div>

  <script src="register.js"></script>
</body>
</html>
